<!DOCTYPE html>
<html>
<head>
  <title>CORS PoC</title>
</head>
<body>
  <h2>Testing API Response...</h2>

  <script>
    async function test() {
      try {
        const res = await fetch("https://agents.hostinger.com/api/agents-backend/api/users/me/credits", {
          method: "GET",
          credentials: "include"
        });

        const data = await res.text();

        document.body.innerHTML =
          "<h3>API Response:</h3><pre>" + data + "</pre>";

      } catch (e) {
        document.body.innerHTML = "Error: " + e;
      }
    }

    test();
  </script>
</body>
</html>
